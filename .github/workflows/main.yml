name: Build Anti-Ban

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          echo "/Users/runner/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          mkdir -p /Users/runner/theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C /Users/runner/theos/sdks --strip-components=1

      - name: Build
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AntiBan-Dylib
          path: packages/*.dylib
